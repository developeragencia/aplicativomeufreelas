<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin | Login - MeuFreelas</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#0f172a; color:#e2e8f0; margin:0; }
      .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
      .card { width:100%; max-width:420px; background:#111827; border:1px solid #1f2937; border-radius:12px; padding:24px; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
      h1 { font-size:22px; margin:0 0 6px; color:#fff; }
      p { margin:0 0 18px; color:#9ca3af; font-size:14px; }
      label { display:block; font-size:13px; color:#cbd5e1; margin:12px 0 6px; }
      input { width:100%; padding:12px; border:1px solid #334155; border-radius:8px; background:#0b1220; color:#e2e8f0; outline:none; }
      input:focus { border-color:#0389ff; box-shadow:0 0 0 3px rgba(3,137,255,.2); }
      button { width:100%; padding:12px; margin-top:16px; background:#0369a1; color:#fff; border:0; border-radius:8px; cursor:pointer; font-weight:600; }
      button:disabled { opacity:.6; cursor:not-allowed; }
      .err { margin-top:12px; background:#7f1d1d; color:#fecaca; padding:10px; border-radius:8px; font-size:13px; display:none; }
      .ok { margin-top:12px; background:#064e3b; color:#bbf7d0; padding:10px; border-radius:8px; font-size:13px; display:none;}
      .hint { margin-top:10px; font-size:12px; color:#94a3b8; text-align:center; }
      a { color:#60a5fa; text-decoration:none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Admin • Login</h1>
        <p>Acesse o painel administrativo do MeuFreelas</p>
        <form id="form">
          <label for="email">E-mail</label>
          <input id="email" type="email" autocomplete="username" required placeholder="admin@meufreelas.com.br" />
          <label for="password">Senha</label>
          <input id="password" type="password" autocomplete="current-password" required placeholder="Sua senha de admin" />
          <button id="btn" type="submit">Entrar</button>
          <div id="err" class="err"></div>
          <div id="ok" class="ok"></div>
        </form>
        <div class="hint">
          Precisa de ajuda? <a href="/">Voltar ao site</a>
        </div>
      </div>
    </div>
    <script>
      (function(){
        var API = (window.location.origin + '/api').replace(/\/+$/, '');
        var f = document.getElementById('form');
        var btn = document.getElementById('btn');
        var err = document.getElementById('err');
        var ok = document.getElementById('ok');
        function show(el, msg){ el.textContent = msg; el.style.display = 'block'; }
        function hide(el){ el.textContent=''; el.style.display='none'; }
        function saveUser(u){
          try{
            localStorage.setItem('meufreelas_user', JSON.stringify(u));
            var users = JSON.parse(localStorage.getItem('meufreelas_users')||'[]');
            if (!Array.isArray(users)) users = [];
            var idx = users.findIndex(function(x){ return x && x.id == u.id; });
            if (idx >= 0) users[idx] = Object.assign({}, users[idx], u); else users.push(u);
            localStorage.setItem('meufreelas_users', JSON.stringify(users));
          }catch(_) {}
        }
        f.addEventListener('submit', function(e){
          e.preventDefault();
          hide(err); hide(ok);
          var email = document.getElementById('email').value.trim();
          var password = document.getElementById('password').value;
          if (!email || !password) { show(err,'Preencha e-mail e senha.'); return; }
          btn.disabled = true; btn.textContent = 'Entrando...';
          fetch(API + '/auth/login.php', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email: email, password: password })
          })
          .then(function(r){ return r.text().then(function(t){ try{return {ok:r.ok, json: JSON.parse(t||'{}')}}catch(_){return {ok:r.ok, json:{}}} }); })
          .then(function(res){
            if (!res.ok || !res.json || !res.json.user) throw new Error(res.json && res.json.error || 'Falha no login');
            var u = res.json.user;
            if (!u || (u.type && String(u.type).toLowerCase() !== 'admin')) {
              throw new Error('Acesso negado: esta conta não é admin.');
            }
            saveUser({ id: String(u.id), email: u.email, name: u.name || u.email, type: 'admin' });
            show(ok,'Autenticado. Redirecionando...');
            // Dupla checagem RBAC (opcional)
            fetch(API + '/rbac.php?email=' + encodeURIComponent(email))
              .then(function(r){ return r.json().catch(function(){return {}}); })
              .then(function(rbac){
                if (rbac && rbac.admin) {
                  window.location.href = '/admin/moderation';
                } else {
                  // ainda assim tenta; AdminRoute validará
                  window.location.href = '/admin/moderation';
                }
              })
              .catch(function(){ window.location.href = '/admin/moderation'; });
          })
          .catch(function(e){
            show(err, e.message || 'Erro ao entrar');
          })
          .finally(function(){
            btn.disabled = false; btn.textContent = 'Entrar';
          });
        });
      })();
    </script>
  </body>
  </html>
