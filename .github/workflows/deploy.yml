name: Deploy to Hostinger via deploy_pull

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger server deploy_pull
        env:
          DEPLOY_TOKEN: ${{ secrets.HOSTINGER_DEPLOY_TOKEN }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "Missing HOSTINGER_DEPLOY_TOKEN secret"
            exit 1
          fi
          curl -sS "https://meufreelas.com.br/api/deploy_pull.php?token=${DEPLOY_TOKEN}" \
            --fail --max-time 60 || exit 1
